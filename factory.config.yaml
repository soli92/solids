factory:
  name: solids-design-system
  description: "SoliDS — Design system EP-019 validation run v2.21.0"

pattern_version: "2.33"
topology: knowledge-only

code_paths:
  - name: solids
    path: .
    layers: [docs, fe]
    vcs:
      mode: monorepo
      branch_strategy: feature-branch
      commit_coupling: decoupled

stack:
  mode: manual

routing:
  docs: agent
  fe: agent

analytics:
  dogfooding:
    enabled: true

design_intelligence:
  enabled: true

# === v2.22→v2.32 opt-in capability stubs (added by 2.21→2.32 upgrade) ============
# Tutti gli stub sono default-OFF (R.P3 opt-in totale): a flag spento la factory
# si comporta esattamente come a v2.21. Abilita esplicitamente ciò che ti serve.

# Central Model Registry (v2.27, PATTERN §29.2) — unico posto per i model ID
models:
  routing:
    tier_fast:    claude-haiku-4-5-20251001   # ruoli ad alta frequenza / basso costo
    tier_default: claude-sonnet-4-6            # maggioranza degli agenti
    tier_deep:    claude-opus-4-8              # ruoli di ragionamento profondo
  overrides: {}                                # eccezioni per-agente, es. wiki-query: tier_fast

# Hybrid Wiki Search Layer (v2.29, EP-042, PATTERN §31)
wiki_search:
  enabled: false                              # opt-in esplicito (R.WS2)

# Temporal Generative Time Model (v2.30, EP-043)
temporal:
  estimate_protocol:
    enabled: false                            # opt-in EP-043 US-152 (R.P3 default off)

# Capability Formativa — tutoring adattivo MVP (v2.32, EP-045)
capability_formativa:
  enabled: false                              # abilita agente tutor + skill EP-045
  wiki_search_integration: false              # integra EP-042 se disponibile (opt-in)

# Tavola Rotonda Mode (v2.27, EP-039, PATTERN §28)
tavola_rotonda:
  enabled: false                              # opt-in totale (R.P3-TR)

# Prototype Generation Layer (v2.26, EP-035, PATTERN §27)
prototyping:
  enabled: false                              # master switch EP-035 (R.P3 default off)

# Parallel Scheduler (v2.11)
scheduler:
  enabled: true
  max_parallel: 20

# Content Share Consumer Layer (v2.33, EP-048, PATTERN §32)
content_share:
  enabled: false                              # R.CS2 opt-in
  target_repo: "soli92/soli-frames"
  source_repo_slug: ""                        # obbligatorio se enabled: true
  source_repo: ""                             # formato org/repo
  pat_env: SOLI_FRAMES_PAT
  secret_env: SOLI_FRAMES_DISPATCH_SECRET
  publish_default: draft
  size_limit_kb: 100
  size_warn_kb: 80
  artifact_categories:
    prototype: true
    analytics_report: true
    custom: true
