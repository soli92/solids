<title>SoliDS Storybook</title>
<meta name="application-name" content="SoliDS Storybook" />
<link rel="icon" type="image/svg+xml" href="/soli-category-icons/soli-icon-favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/soli-category-icons/soli-icon-favicon.png" />
<link rel="apple-touch-icon" href="/soli-category-icons/soli-icon-apple-touch.png" />
<link rel="manifest" href="/soli-category-icons/soli-storybook.webmanifest" />
<script>
  (function () {
    var KEY = "solids:sb:theme";
    window.addEventListener("storage", function (e) {
      if (e && e.key === KEY) {
        // Ricarica solo il manager UI per applicare il nuovo theme
        window.location.reload();
      }
    });
  })();
</script>
