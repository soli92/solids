# Deploy manuale di Storybook su GitHub Pages.
#
# Il deploy automatico dopo ogni release npm avviene nel workflow "Release"
# (job storybook-build / storybook-deploy), perché le release create da
# semantic-release con GITHUB_TOKEN non attivano workflow con `on: release`.
#
# Usa: Actions → Deploy Storybook → Run workflow.
name: Deploy Storybook

on:
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build Storybook (base path for /solids/ Pages)
        run: npm run build-storybook
        env:
          SB_BASE: /solids/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
