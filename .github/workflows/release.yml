name: Release

on:
  push:
    branches: ["main"]

# workflows: @semantic-release/git fa `git push --tags`: ogni tag locale viene inviato; GitHub
# rifiuta i tag che puntano a commit che modificano workflow senza questo scope.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  workflows: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      # Dopo un force-push sui tag (es. riscrittura history), `git fetch --tags` fallirebbe con
      # "would clobber existing tag". semantic-release esegue fetch dei tag: allinea prima al remoto.
      - name: Allinea tag al remoto
        run: git fetch origin --tags --force

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org/"

      - run: npm ci
      - run: npm run build

      - run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Le release create con GITHUB_TOKEN non attivano workflow con `on: release`.
  # Il deploy Pages deve stare nello stesso workflow, dopo semantic-release.
  storybook-build:
    name: Build Storybook (Pages)
    needs: release
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      # semantic-release può aver pushato chore(release) su main nello step precedente: usa main aggiornato.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build Storybook (base path /solids/)
        run: npm run build-storybook
        env:
          SB_BASE: /solids/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  storybook-deploy:
    name: Deploy Storybook to GitHub Pages
    needs: storybook-build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
