<?xml version="1.0" encoding="UTF-8"?>
<!--
  Master icon: tema app (notte / party / corona festeggiato).
  Rigenera PNG con: npm run icons
  Area centrale ~66% sicura per maskable Android.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1244"/>
      <stop offset="55%" stop-color="#12082a"/>
      <stop offset="100%" stop-color="#0f0520"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8fab"/>
      <stop offset="100%" stop-color="#ff6b8a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- alone luminoso dietro -->
  <circle cx="256" cy="268" r="158" fill="#ff6b8a" opacity="0.12"/>
  <circle cx="256" cy="268" r="118" fill="#c9a84c" opacity="0.08"/>
  <!-- corona stilizzata -->
  <g fill="url(#gold)" transform="translate(256 248)">
    <path d="M-120 52 L-120 8 L-72 -48 L-24 8 L0 -72 L24 8 L72 -48 L120 8 L120 52 Z"/>
    <rect x="-132" y="44" width="264" height="36" rx="10"/>
  </g>
  <!-- gemme -->
  <circle cx="136" cy="188" r="14" fill="url(#magenta)"/>
  <circle cx="256" cy="148" r="16" fill="url(#magenta)"/>
  <circle cx="376" cy="188" r="14" fill="url(#magenta)"/>
  <!-- confetti 90s -->
  <rect x="96" y="96" width="22" height="22" rx="4" fill="#7eb8ff" opacity="0.85" transform="rotate(-12 107 107)"/>
  <rect x="388" y="118" width="18" height="18" rx="3" fill="#6effc5" opacity="0.75" transform="rotate(18 397 127)"/>
  <rect x="360" y="360" width="20" height="20" rx="4" fill="#ffb347" opacity="0.8" transform="rotate(8 370 370)"/>
  <rect x="108" y="352" width="16" height="16" rx="2" fill="#ff6b8a" opacity="0.65" transform="rotate(-22 116 360)"/>
